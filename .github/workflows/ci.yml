name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run safety + smoke tests
        run: python -m pytest tests/ -v

      - name: CLI smoke test (Tier 1, zero dependencies)
        run: |
          python scripts/reduce.py examples/inputs/02_dup_paragraphs.txt --stats

      - name: Reasoning benchmark self-test (offline; no API key needed)
        run: |
          python benchmarks/reasoning_preservation.py --selftest

      - name: Reasoning benchmark power tables (offline sanity)
        run: |
          python benchmarks/reasoning_preservation.py --power-calc
